# =============================================================================
# Structo — Nginx Reverse Proxy Configuration
# Server: AWS EC2 (Linux)
# Services:
#   /          → Next.js frontend   (127.0.0.1:3000)
#   /api/      → Express backend    (127.0.0.1:4000)
#   /processing/ → FastAPI service  (127.0.0.1:8000)
#
# SSL cert paths — replace with actual paths provided by GT/DCS/IAS
#   ssl_certificate     /etc/nginx/certs/server.crt
#   ssl_certificate_key /etc/nginx/certs/server.key
# =============================================================================

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # ── Logging ──────────────────────────────────────────────────────────────
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # ── Upload size limit (for PDF/XML document uploads) ─────────────────────
    client_max_body_size 100M;

    # ── Upstream services ─────────────────────────────────────────────────────
    upstream frontend {
        server 127.0.0.1:3000;
    }

    upstream backend {
        server 127.0.0.1:4000;
    }

    upstream processing {
        server 127.0.0.1:8000;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name YOUR_DOMAIN_OR_EC2_IP;

        return 301 https://$host$request_uri;
    }

    # ── HTTPS main server block ───────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name YOUR_DOMAIN_OR_EC2_IP;

        # ── SSL Certificates (provided by GT/DCS/IAS) ────────────────────────
        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;

        # ── SSL Protocols & Ciphers ───────────────────────────────────────────
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # ── Security headers ──────────────────────────────────────────────────
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ── Error pages ───────────────────────────────────────────────────────
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }

        # ── Backend API — /api/* → Express (port 4000) ───────────────────────
        # Strips /api prefix before forwarding.
        # Set NEXT_PUBLIC_API_URL=https://YOUR_DOMAIN/api in frontend .env.production
        location /api/ {
            proxy_pass         http://backend/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Timeouts — backend may do DB queries
            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        # ── Processing API — /processing/* → FastAPI (port 8000) ─────────────
        # Strips /processing prefix before forwarding.
        # Set NEXT_PUBLIC_PROCESSING_URL=https://YOUR_DOMAIN/processing in frontend .env.production
        location /processing/ {
            proxy_pass         http://processing/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Longer timeouts — PDF/XML processing can take time
            proxy_connect_timeout 120s;
            proxy_send_timeout    300s;
            proxy_read_timeout    300s;
        }

        # ── Next.js WebSocket support (hot reload / real-time features) ───────
        location /_next/webpack-hmr {
            proxy_pass         http://frontend/_next/webpack-hmr;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
        }

        # ── Frontend — all other traffic → Next.js (port 3000) ───────────────
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";

            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }
    }
}

name: Build & Deploy to Staging

on:
  push:
    branches: [master]   # triggers on every push to master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Login to Docker Hub ─────────────────────────────────────────────────
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Set up Docker Buildx (for multi-platform / layer caching) ───────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Build & Push Frontend ───────────────────────────────────────────────
      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          target: production
          push: true
          tags: killy101/structo-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Build & Push Backend ────────────────────────────────────────────────
      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          target: production
          push: true
          tags: killy101/structo-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Build & Push Processing ─────────────────────────────────────────────
      - name: Build and push processing
        uses: docker/build-push-action@v5
        with:
          context: ./processing
          target: production
          push: true
          tags: killy101/structo-processing:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── SSH into EC2 and pull + restart containers ──────────────────────────
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /opt/structo
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f

name: CI / CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  REGISTRY: docker.io
  IMAGE_PREFIX: killy101

jobs:
  # ── Lint & Test ───────────────────────────────────────────────────────────────
  test-frontend:
    name: Frontend – lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm run test -- --passWithNoTests --ci

  test-backend:
    name: Backend – lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install system deps (for bcrypt native build)
        run: sudo apt-get install -y python3 make g++

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Run tests
        run: npm run test -- --passWithNoTests --ci
        env:
          JWT_SECRET: test-secret-for-ci
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test

  test-processing:
    name: Processing – lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: processing
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: processing/requirements.txt

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: Check syntax
        run: python -m py_compile main.py

  # ── Build & Push Docker Images ────────────────────────────────────────────────
  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    needs: [test-frontend, test-backend, test-processing]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "tag=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      # Frontend
      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          target: production
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/structo-frontend:latest
            ${{ env.IMAGE_PREFIX }}/structo-frontend:${{ steps.meta.outputs.tag }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      # Backend
      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          target: production
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/structo-backend:latest
            ${{ env.IMAGE_PREFIX }}/structo-backend:${{ steps.meta.outputs.tag }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      # Processing
      - name: Build & push processing
        uses: docker/build-push-action@v5
        with:
          context: ./processing
          target: production
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/structo-processing:latest
            ${{ env.IMAGE_PREFIX }}/structo-processing:${{ steps.meta.outputs.tag }}
          cache-from: type=gha,scope=processing
          cache-to: type=gha,mode=max,scope=processing

      - name: Image tags summary
        run: |
          echo "### Docker images pushed" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`killy101/structo-frontend:${{ steps.meta.outputs.tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`killy101/structo-backend:${{ steps.meta.outputs.tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`killy101/structo-processing:${{ steps.meta.outputs.tag }}\`" >> "$GITHUB_STEP_SUMMARY"

services:

  # ── Database ──────────────────────────────────────────────────────────────────
  # Self-hosted PostgreSQL running alongside the app on EC2.
  #
  # To use AWS RDS instead (recommended for production):
  #   1. Delete this entire `db` service block
  #   2. Remove the `depends_on` block from the `backend` service below
  #   3. Remove `postgres_data` from the `volumes` section at the bottom
  #   4. Set DATABASE_URL in backend/.env.production to your RDS endpoint:
  #      DATABASE_URL=postgresql://user:pass@your-cluster.rds.amazonaws.com:5432/structo
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-structo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in backend/.env.production or shell env}
      POSTGRES_DB: ${POSTGRES_DB:-structo}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # schema.sql runs automatically on first boot (empty database only)
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-structo} -d ${POSTGRES_DB:-structo}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Frontend ──────────────────────────────────────────────────────────────────
  frontend:
    image: killy101/structo-frontend:${TAG:-latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        # NEXT_PUBLIC_* vars are baked in at build time — set this before building
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://yourdomain.com/api}
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env.production
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    depends_on:
      - backend

  # ── Backend ───────────────────────────────────────────────────────────────────
  backend:
    image: killy101/structo-backend:${TAG:-latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    ports:
      - "4000:4000"
    env_file:
      - ./backend/.env.production
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

  # ── Processing ────────────────────────────────────────────────────────────────
  processing:
    image: killy101/structo-processing:${TAG:-latest}
    build:
      context: ./processing
      dockerfile: Dockerfile
      target: production
    # Port 8000 is intentionally NOT exposed to the host.
    # The backend reaches it via the internal Docker network (http://processing:8000).
    # Exposing it publicly would bypass all authentication and rate limiting.
    volumes:
      - processing_data:/app/data
    env_file:
      - ./processing/.env.production
    environment:
      # Cap concurrent diff jobs per Uvicorn worker (4 workers × 3 = 12 max system-wide).
      # Lower this on smaller hosts; raise it if you have many CPU cores.
      - MAX_CONCURRENT_DIFFS=${MAX_CONCURRENT_DIFFS:-3}
      # Hard timeout per compare job in seconds (5 minutes).
      - COMPARE_TIMEOUT_SECONDS=${COMPARE_TIMEOUT_SECONDS:-300}
    deploy:
      resources:
        limits:
          # 4 GB RAM — each PDF compare can use 200–500 MB; 4 GB supports ~8 simultaneous.
          # Increase if documents are very large or you raise MAX_CONCURRENT_DIFFS.
          memory: 4G
          # 2 CPU cores reserved for the processing container.
          # Each compare uses 2 threads internally; 2 cores keeps the host responsive.
          cpus: '2.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    restart: unless-stopped

networks:
  default:
    name: structo_prod_network

volumes:
  postgres_data:     # PostgreSQL data — persistent across restarts
  processing_data:   # SQLite job DB + uploaded PDF bytes

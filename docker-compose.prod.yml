services:

  # ── Frontend ──────────────────────────────────────────────────────────────────
  frontend:
    image: killy101/structo-frontend:${TAG:-latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env.production
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    depends_on:
      - backend
      - processing

  # ── Backend ───────────────────────────────────────────────────────────────────
  backend:
    image: killy101/structo-backend:${TAG:-latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    ports:
      - "4000:4000"
    env_file:
      - ./backend/.env.production
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  # ── Processing ────────────────────────────────────────────────────────────────
  processing:
    image: killy101/structo-processing:${TAG:-latest}
    build:
      context: ./processing
      dockerfile: Dockerfile
      target: production
    # Port 8000 is intentionally NOT exposed to the host.
    # The backend reaches it via the internal Docker network (http://processing:8000).
    # Exposing it publicly would bypass all authentication and rate limiting.
    volumes:
      - processing_data:/app/data
    env_file:
      - ./processing/.env.production
    restart: unless-stopped

networks:
  default:
    name: structo_prod_network

volumes:
  processing_data:   # persists SQLite job DB + uploaded PDF bytes across restarts

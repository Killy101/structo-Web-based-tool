services:

  # ── Frontend (Next.js) ────────────────────────────────────────────────────────
  frontend:
    image: killy101/structo-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    volumes:
      - ./frontend:/app
      - frontend_nm:/app/node_modules
      - frontend_next:/app/.next
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env.local
    environment:
      - NODE_ENV=development
    depends_on:
      - backend
      - processing

  # ── Backend (Express + pg) ────────────────────────────────────────────────────
  backend:
    image: killy101/structo-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    volumes:
      - ./backend:/app
      - backend_nm:/app/node_modules
    ports:
      - "4000:4000"
    env_file:
      - ./backend/.env

  # ── Processing (FastAPI + Python) ─────────────────────────────────────────────
  processing:
    image: killy101/structo-processing:latest
    build:
      context: ./processing
      dockerfile: Dockerfile
      target: development
    volumes:
      - ./processing:/app
    ports:
      - "8000:8000"
    env_file:
      - ./processing/.env

# Named volumes
volumes:
  frontend_nm:
  frontend_next:
  backend_nm:
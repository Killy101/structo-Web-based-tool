services:

  # ── Frontend (Next.js) ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development        # uses the hot-reload stage
    volumes:
      - ./frontend:/app          # bind-mount source for hot reload
      - frontend_nm:/app/node_modules   # keep container node_modules isolated
      - frontend_next:/app/.next        # persist Next.js build cache
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env.local    # copy from frontend/.env.example
    environment:
      - NODE_ENV=development
    depends_on:
      - backend
      - processing

  # ── Backend (Express + pg) ────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development        # uses the hot-reload stage
    volumes:
      - ./backend:/app           # bind-mount source for hot reload
      - backend_nm:/app/node_modules    # keep container node_modules isolated
    ports:
      - "4000:4000"
    env_file:
      - ./backend/.env           # copy from backend/.env.example
    environment:
      - NODE_ENV=development

  # ── Processing (FastAPI + Python) ─────────────────────────────────────────────
  processing:
    build:
      context: ./processing
      dockerfile: Dockerfile
      target: development        # uses the hot-reload stage
    volumes:
      - ./processing:/app        # bind-mount source for hot reload
      - processing_data:/app/data  # persist SQLite job DB + PDF bytes across restarts
    ports:
      - "8000:8000"              # DEV ONLY — remove in production (see docker-compose.prod.yml)
    env_file:
      - ./processing/.env        # copy from processing/.env.example
    environment:
      - NODE_API_URL=http://backend:4000
    depends_on:
      - backend

# Named volumes prevent node_modules / Python cache from being overwritten by host mounts
volumes:
  frontend_nm:
  frontend_next:
  backend_nm:
  processing_data:   # persists SQLite job DB + uploaded PDF bytes across restarts
